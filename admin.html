<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steary Admin - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="src/assets/bg.webp" type="image/webp">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- Theme Initializer to prevent FOUC -->
    <script>
        if (localStorage.getItem('steary.admin.theme') === 'light') {
            document.documentElement.classList.add('light-mode');
            document.body.classList.add('light-mode');
        }
    </script>
    <!-- Background container -->
    <div class="app-bg-container">
        <img class="app-bg-image" src="src/assets/bg.webp" alt="Website Background" loading="eager" decoding="async">
        <div class="app-bg-overlay"></div>
    </div>

    <!-- Login Container -->
    <div class="admin-login-wrapper">
        <div class="glass-panel admin-login-panel animate-scale-up">
            <div class="admin-header">
                <svg class="logo-icon" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 6l6 6-6 6"/>
                    <line x1="14" y1="18" x2="20" y2="18"/>
                </svg>
                <h1>Steary Admin</h1>
                <p>Control Panel Access</p>
            </div>

            <form id="adminLoginForm" class="admin-form">
                <div class="form-group">
                    <label for="adminId">Administrator Email</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="email" id="adminId" required autocomplete="off" placeholder="Enter Admin Email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminPass">Security Password</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="adminPass" required autocomplete="off" placeholder="Enter Password">
                    </div>
                </div>

                <div id="loginError" class="login-error hidden">Invalid ID or Password. Access Denied.</div>

                <button type="submit" class="btn btn-primary btn-block">
                    Authenticate
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>
            
            <a href="index.html" class="back-link">Return to Main Website</a>
        </div>
    </div>

    <!-- Supabase CDN Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.min.js"></script>
</body>
</html>
